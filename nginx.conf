server {
    listen 8092;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS + a variable upstream force per-request resolution,
    # so recreating the backend nginx doesn't require restarting this one
    # (a static name is resolved once at startup and 502s after recreate).
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/v1/ {
        set $api_upstream guild-service-v2-nginx;
        # No URI part on proxy_pass: with a variable upstream nginx forwards
        # the original request URI unchanged, same as the static form did.
        proxy_pass http://$api_upstream:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }
}
